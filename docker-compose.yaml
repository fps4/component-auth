version: "3.9"

services:
  mongo:
    container_name: core-auth-mongo
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  auth:
    container_name: core-auth
    build:
      context: .
      dockerfile: service/Dockerfile
    depends_on:
      - mongo
    environment:
      PORT: 7305
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: core-auth
      AUTH_JWT_SECRET: local-dev-secret
      AUTH_JWT_ISSUER: core-auth-service
      AUTH_JWT_AUDIENCE: core-auth-clients
      SESSION_TTL_MINUTES: 15
      LOG_LEVEL: debug
      LOG_PRETTY: "true"
    ports:
      - "7305:7305"

volumes:
  mongo_data:
